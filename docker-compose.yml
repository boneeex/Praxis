services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: praxis
      POSTGRES_PASSWORD: praxis
      POSTGRES_DB: praxis
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U praxis"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://praxis:praxis@postgres:5432/praxis
      REDIS_URL: redis://redis:6379/0
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: praxis
      MINIO_PUBLIC_ENDPOINT: localhost:9000
      JWT_PRIVATE_KEY_PATH: /app/pems/private.pem
      JWT_PUBLIC_KEY_PATH: /app/pems/public.pem
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      EXECUTE_QUEUE_KEY: execute:queue
      MAX_CONCURRENT_RUNS: "4"
      EXECUTE_TIMEOUT_SEC: "10"
      EXECUTE_OUTPUT_LIMIT: "65536"
    volumes:
      - ./backend:/app
      - ./pems:/app/pems
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: python -m worker.main
    environment:
      DATABASE_URL: postgresql+asyncpg://praxis:praxis@postgres:5432/praxis
      REDIS_URL: redis://redis:6379/0
      EXECUTE_QUEUE_KEY: execute:queue
      MAX_CONCURRENT_RUNS: "4"
      EXECUTE_TIMEOUT_SEC: "10"
      EXECUTE_OUTPUT_LIMIT: "65536"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
  minio_data:
